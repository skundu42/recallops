name: CI

# Repository CI for RecallOps.
#   - lint:                 ruff over the package + tests (fast, blocking)
#   - test:                 pytest + coverage on Python 3.11 / 3.12 / 3.13
#   - build:                sdist + wheel, validated with `twine check`
#   - pgvector-integration: exercises the live pgvector adapter against a real
#                           Postgres+pgvector service (RECALL_PG_DSN is set)
#
# This is the CI for the RecallOps repo itself. It is NOT the product's
# retrieval-gate template that ships to users; that lives, untouched, at
# examples/github-action/recall-ci.yml.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ruff is pinned via the [dev] extra in pyproject; install just ruff to
      # keep this job lean. (Equivalent: `pip install -e ".[dev]"`.)
      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check recallops tests

  # ── Test matrix + coverage ────────────────────────────────────────────────
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (with dev extra)
        run: pip install -e ".[dev]"

      # pgvector live tests auto-skip here (RECALL_PG_DSN unset); the dedicated
      # pgvector-integration job below provides that coverage. No external
      # services (e.g. Codecov) are required; coverage.xml is kept as an
      # artifact instead.
      - name: Run tests with coverage
        run: pytest -q --cov=recallops --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          # Artifact names must be unique per matrix leg (upload-artifact v4).
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error

  # ── Build + metadata validation ───────────────────────────────────────────
  build:
    name: Build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Version is tag-derived (hatch-vcs); fetch tags so the built version
          # is real (a shallow clone would fall back to a dev/0.0.0 version).
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Validate distribution metadata
        run: twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  # ── Live pgvector adapter integration ─────────────────────────────────────
  # Gives the pgvector adapter real coverage against Postgres + the pgvector
  # extension. `continue-on-error` is intentionally FALSE so a broken live
  # adapter fails CI. If the pgvector service proves flaky in your fork and you
  # want it advisory-only, flip this to `continue-on-error: true` (and consider
  # adding `if: github.event_name == 'push'` to skip it on PRs).
  pgvector-integration:
    name: pgvector integration (live)
    runs-on: ubuntu-latest
    continue-on-error: false
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the steps run.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Points the test suite (and the adapter) at the service container.
      RECALL_PG_DSN: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (dev + pg extras)
        run: pip install -e ".[dev,pg]"

      # The adapter itself issues `CREATE EXTENSION IF NOT EXISTS vector`, so
      # this step is belt-and-suspenders: it guarantees the extension exists
      # even if the adapter path changes. `psql` is preinstalled on ubuntu-latest
      # runners; the pgvector/pgvector image already ships the extension files.
      - name: Ensure pgvector extension
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d postgres -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run pgvector adapter tests
        run: pytest tests/test_pgvector.py -q
