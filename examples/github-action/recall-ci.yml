# RecallOps CI via the composite action (PRD FR-9.1). Two phases, one PR
# comment that updates in place.
#
# Prerequisites:
#   1. recall.yaml at the repo root (`recall init`) pointing `source:` at your
#      docs and selecting an adapter (the built-in `local` adapter is $0).
#   2. A baseline .recall store for PRs to gate against: the FIRST run on main
#      ingests and saves it to the actions cache (save-baseline below); seed
#      the dataset + calibration locally and commit or cache them.
#   3. For a paid embedding provider, export its key (e.g. OPENAI_API_KEY)
#      in both jobs and keep the cost gate honest with max-cost.
#
# Pin `skundu42/recallops@<release tag>` in real projects; @main shown for
# brevity.

name: RecallOps CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Phase 1: blocking gate (<5 min; eval + diff + funnel; no re-embedding).
  gate:
    name: Retrieval gate (phase 1)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # PR comment
    steps:
      - uses: actions/checkout@v4

      - uses: skundu42/recallops@main
        id: gate
        with:
          # Advance the baseline only when a commit lands on main.
          save-baseline: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          # OPENAI_API_KEY etc. would be provided via `env:` on this step.

      # Hand the store + diff id to the async phase-2 job.
      - uses: actions/upload-artifact@v4
        if: ${{ always() && github.event_name == 'pull_request' }}
        with:
          name: recall-store
          path: |
            .recall
            recall-report.md
            recall-diff-id.txt
          include-hidden-files: true

  # Phase 2: async deep attribution; edits the same PR comment; never blocks.
  attribute:
    name: Deep attribution (phase 2)
    needs: gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: recall-store

      - uses: skundu42/recallops@main
        with:
          phase: attribute
          max-cost: "5.00"
